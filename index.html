<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Workflow Builder</title>
  <script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
    }

    h3 {
      margin-top: 0;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .column {
      width: 50%;
    }

    .box {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      border-radius: 6px;
    }

    .item {
      padding: 8px;
      margin: 5px 0;
      background: #f4f4f4;
      cursor: grab;
      border-radius: 4px;
    }

    .item:hover {
      background: #e0e0e0;
    }

    .selected {
      background: #d0ebff;
    }
  </style>
</head>

<body>
  <h3>Custom Workflow Builder</h3>

  <div class="container">
    <div class="column">
      <h4>Available Steps</h4>
      <div id="available" class="box"></div>
    </div>

    <div class="column">
      <h4>Your Workflow</h4>
      <div id="workflow" class="box"></div>
    </div>
  </div>

  <script>
    const steps = [
      "Project Planning",
      "Content Briefing",
      "Initial Drafting",
      "Internal Review",
      "SME Review",
      "Translation Prep",
      "Language Services (LS)",
      "Translation",
      "Localization Review",
      "Linguistic Sign-off",
      "QA",
      "Final Approval",
      "Publishing"
    ];

    const available = document.getElementById("available");
    const workflow = document.getElementById("workflow");

    // Populate available steps
    steps.forEach(step => {
      const el = document.createElement("div");
      el.className = "item";
      el.innerText = step;

      el.onclick = () => addToWorkflow(step);

      available.appendChild(el);
    });

    function addToWorkflow(step) {
      const el = document.createElement("div");
      el.className = "item";
      el.innerText = step;

      // Remove on click
      el.onclick = () => el.remove();

      // Enable drag
      el.draggable = true;

      el.addEventListener("dragstart", dragStart);
      el.addEventListener("dragover", dragOver);
      el.addEventListener("drop", drop);

      workflow.appendChild(el);

      resizeWidget();
    }

    // Drag logic
    let dragged;

    function dragStart(e) {
      dragged = e.target;
    }

    function dragOver(e) {
      e.preventDefault();
    }

    function drop(e) {
      e.preventDefault();
      if (e.target.classList.contains("item")) {
        workflow.insertBefore(dragged, e.target);
      }
    }

    function getWorkflowData() {
      const items = workflow.querySelectorAll(".item");
      const result = [];
      items.forEach(el => result.push(el.innerText));
      return result;
    }

    function resizeWidget() {
      JFCustomWidget.requestFrameResize({
        height: document.body.scrollHeight
      });
    }

    // Jotform integration
    JFCustomWidget.subscribe("ready", function () {
      resizeWidget();

      JFCustomWidget.subscribe("submit", function () {
        const data = {
          valid: true,
          value: JSON.stringify(getWorkflowData())
        };
        JFCustomWidget.sendSubmit(data);
      });
    });
  </script>
</body>
</html>
