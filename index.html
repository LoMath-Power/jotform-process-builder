<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jotform Widget - Persistence Fix</title>
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
        .container { display: flex; gap: 10px; }
        .col { flex: 1; background: white; padding: 15px; border: 1px solid #ccc; border-radius: 5px; min-height: 350px; }
        h3 { margin-top: 0; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .add-btn { 
            display: block; width: 100%; text-align: left; padding: 8px; margin-bottom: 5px; 
            background: #fff; border: 1px solid #ddd; cursor: pointer; border-radius: 3px; font-size: 13px;
        }
        .add-btn:hover { background: #f0f0f0; }

        .step-row { 
            background: #fff; border: 1px solid #3498db; border-left: 4px solid #3498db; 
            padding: 10px; margin-bottom: 10px; border-radius: 3px; position: relative;
        }
        .step-name { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        .step-label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
        .step-input { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid #ccc; font-size: 12px; }
        .remove-btn { position: absolute; top: 5px; right: 5px; color: red; border: none; background: none; cursor: pointer; font-size: 11px; }
        
        .status-dot { font-size: 10px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="col">
        <h3>Possible Steps</h3>
        <div id="master-list"></div>
    </div>
    <div class="col">
        <h3>Your Process</h3>
        <div id="selected-list"></div>
        <span class="status-dot" id="status">Syncing...</span>
    </div>
</div>

<script>
    const options = [
        "Project Planning", "Content Briefing", "Initial Drafting", "Internal Review", 
        "SME Review", "Translation Prep", "Language Services (LS)", "Translation", 
        "Localization Review", "Linguistic Sign-off", "QA", "Final Approval", "Publishing"
    ];

    let selectedSteps = [];
    const STORAGE_KEY = "jotform_process_backup";

    function addStep(name) {
        selectedSteps.push({ name: name, owner: "" });
        render();
    }

    function removeStep(index) {
        selectedSteps.splice(index, 1);
        render();
    }

    function updateOwner(index, val) {
        selectedSteps[index].owner = val;
        sync(); 
    }

    function render() {
        const list = document.getElementById('selected-list');
        list.innerHTML = selectedSteps.length === 0 ? '<p style="color:gray; font-size:12px;">No steps added.</p>' : '';
        
        selectedSteps.forEach((s, i) => {
            const inputId = `owner-input-${i}`;
            const div = document.createElement('div');
            div.className = 'step-row';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeStep(${i})">Remove</button>
                <span class="step-name">${i + 1}. ${s.name}</span>
                <label class="step-label" for="${inputId}">Responsible person:</label>
                <input id="${inputId}" name="${inputId}" class="step-input" type="text" placeholder="Enter name" value="${s.owner}" oninput="updateOwner(${i}, this.value)">
            `;
            list.appendChild(div);
        });
        sync();
    }

    function getPayload() {
        const dataString = JSON.stringify(selectedSteps);
        return {
            valid: selectedSteps.length > 0,
            value: dataString
        };
    }

    function sync() {
        const payload = getPayload();
        
        // Backup for local persistence
        localStorage.setItem(STORAGE_KEY, payload.value);

        if (typeof JFCustomWidget !== 'undefined') {
            // Updated to pass both valid and value as per the photo example
            JFCustomWidget.sendData(payload);
            document.getElementById('status').innerText = "Last sync: " + new Date().toLocaleTimeString();
        }
    }

    // Initialize Master List
    const mList = document.getElementById('master-list');
    options.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'add-btn';
        b.innerText = "+ " + opt;
        b.onclick = () => addStep(opt);
        mList.appendChild(b);
    });

    if (typeof JFCustomWidget !== 'undefined') {
        // Subscribe to Ready
        JFCustomWidget.subscribe("ready", function(msg) {
            console.log("ready message arrived from JotForm", msg);
            
            // Priority 1: Restore from JotForm's provided msg.value
            if (msg && msg.value && msg.value !== "" && msg.value !== "[]") {
                try {
                    selectedSteps = JSON.parse(msg.value);
                    render();
                } catch (e) { console.error("Error parsing Jotform value", e); }
            } 
            // Priority 2: Fallback to LocalStorage (important for page navigation)
            else {
                const backup = localStorage.getItem(STORAGE_KEY);
                if (backup) {
                    try {
                        selectedSteps = JSON.parse(backup);
                        render();
                    } catch (e) { console.error("Error parsing backup", e); }
                }
            }

            // Continuous resize
            setInterval(() => {
                JFCustomWidget.requestFrameResize({ height: document.body.offsetHeight + 40 });
            }, 800);
        });

        // Subscribe to Submit - Using sendSubmit as per the Take Photo example
        JFCustomWidget.subscribe("submit", function() {
            const payload = getPayload();
            console.log("Sending final submit payload:", payload);
            JFCustomWidget.sendSubmit(payload);
        });
    }
</script>

</body>
</html>
