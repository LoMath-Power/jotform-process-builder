<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Workflow Builder</title>

  <!-- Jotform API -->
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
    }

    h3 {
      margin-top: 0;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .column {
      width: 50%;
    }

    .box {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      border-radius: 6px;
      background: #fafafa;
    }

    .item {
      padding: 8px;
      margin: 5px 0;
      background: #f4f4f4;
      border-radius: 4px;
      cursor: pointer;
    }

    .item:hover {
      background: #e0e0e0;
    }

    .workflow-item {
      background: #d0ebff;
    }

    .btn {
      margin-top: 10px;
      padding: 6px 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <h3>Custom Workflow Builder</h3>

  <div class="container">
    <!-- Available Steps -->
    <div class="column">
      <h4>Available Steps</h4>
      <div id="available" class="box"></div>
    </div>

    <!-- Workflow -->
    <div class="column">
      <h4>Your Workflow</h4>
      <div id="workflow" class="box"></div>
      <button class="btn" onclick="clearWorkflow()">Clear Workflow</button>
    </div>
  </div>

  <script>
    const steps = [
      "Project Planning",
      "Content Briefing",
      "Initial Drafting",
      "Internal Review",
      "SME Review",
      "Translation Prep",
      "Language Services (LS)",
      "Translation",
      "Localization Review",
      "Linguistic Sign-off",
      "QA",
      "Final Approval",
      "Publishing"
    ];

    let workflowContainer;

    // Add step to workflow
    function addToWorkflow(step) {
      const el = document.createElement("div");
      el.className = "item workflow-item";
      el.innerText = step;

      // Remove on click
      el.onclick = () => {
        el.remove();
        resizeWidget();
      };

      workflowContainer.appendChild(el);
      resizeWidget();
    }

    // Clear workflow
    function clearWorkflow() {
      workflowContainer.innerHTML = "";
      resizeWidget();
    }

    // Resize iframe
    function resizeWidget() {
      if (window.JFCustomWidget) {
        JFCustomWidget.requestFrameResize({
          height: document.body.scrollHeight
        });
      }
    }

    // INIT JOTFORM
    JFCustomWidget.subscribe("ready", function (data) {

      const availableContainer = document.getElementById("available");
      workflowContainer = document.getElementById("workflow");

      // Populate available steps
      steps.forEach(step => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerText = step;

        el.onclick = () => addToWorkflow(step);

        availableContainer.appendChild(el);
      });

      // 🔥 LOAD SAVED DATA (PERSISTENCE FIX)
      if (data && data.value) {
        try {
          const savedSteps = JSON.parse(data.value);

          if (Array.isArray(savedSteps)) {
            savedSteps.forEach(step => {
              addToWorkflow(step);
            });
          }

        } catch (e) {
          console.error("Error loading saved workflow:", e);
        }
      }

      // Ensure visible height
      JFCustomWidget.requestFrameResize({ height: 500 });

      resizeWidget();

      // Submit handler
      JFCustomWidget.subscribe("submit", function () {

        const items = workflowContainer.querySelectorAll(".workflow-item");
        const result = Array.from(items).map(el => el.innerText);

        JFCustomWidget.sendSubmit({
          valid: true,
          value: JSON.stringify(result)
        });

      });

    });
  </script>

</body>
</html>
