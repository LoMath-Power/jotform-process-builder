<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jotform Process Builder Widget</title>
    <!-- Jotform Custom Widget API -->
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <style>
        :root {
            --primary-color: #0a1551;
            --accent-color: #3498db;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
            --border-color: #d1d5db;
            --drag-bg: #e0f2fe;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: #333;
        }

        .widget-container {
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: flex-start;
            width: 100%;
        }

        .column {
            flex: 1;
            min-width: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin-top: 0;
            font-size: 0.95rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: var(--bg-color);
            color: var(--primary-color);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .helper-text {
            font-size: 0.7rem;
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: normal;
            line-height: 1.2;
        }

        .master-list-items {
            overflow-y: auto;
            max-height: 500px;
        }

        .step-pill {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            color: #4b5563;
            word-wrap: break-word;
        }

        .step-pill:hover {
            border-color: var(--accent-color);
            background-color: #f0f7ff;
            transform: translateX(3px);
            color: var(--accent-color);
        }

        .selected-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
        }

        .empty-state {
            color: #9ca3af;
            text-align: center;
            margin-top: 50px;
            font-style: italic;
            font-size: 0.8rem;
        }

        .selected-card {
            background: white;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            border-radius: 8px;
            padding: 10px;
            position: relative;
            cursor: grab;
        }

        .selected-card:active { cursor: grabbing; }
        .selected-card.dragging { opacity: 0.5; background-color: var(--drag-bg); border-style: dashed; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            pointer-events: none;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f2937;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            word-break: break-word;
        }

        .drag-handle { color: #9ca3af; font-size: 1rem; line-height: 1.2; flex-shrink: 0; }

        .remove-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.75rem;
            border-radius: 4px;
            pointer-events: auto;
        }

        .remove-btn:hover { background: #fee2e2; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: auto;
        }

        .input-group label {
            font-size: 0.65rem;
            color: #6b7280;
            text-transform: uppercase;
        }

        .input-group input {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.85rem;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            user-select: text;
        }

        .input-group input:focus { border-color: var(--accent-color); }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="column">
            <h3>Possible Steps</h3>
            <div class="helper-text">Click to add. You can select the same step multiple times.</div>
            <div class="master-list-items" id="master-list"></div>
        </div>

        <div class="column">
            <h3>Sequence <span class="badge" id="selected-count">0</span></h3>
            <div class="helper-text">Drag to reorder</div>
            <div class="selected-container" id="selected-container">
                <div class="empty-state">Select steps to begin.</div>
            </div>
        </div>
    </div>

    <script>
        const stepDefinitions = [
            "Project Planning", "Content Briefing", "Initial Drafting",
            "Internal Review Cycle", "SME/Technical Review", "Final Copy Refinement",
            "Translation Prep", "Language Services (LS)", "Translation Phase",
            "Localization Review", "Linguistic Sign-off", "Quality Assurance (QA)",
            "Design/DTP Phase", "Final Approval", "Publishing/Distribution"
        ];

        let selectedSteps = [];
        let isReady = false;

        const masterList = document.getElementById('master-list');
        const selectedContainer = document.getElementById('selected-container');
        const selectedCount = document.getElementById('selected-count');

        function initUI() {
            masterList.innerHTML = '';
            stepDefinitions.forEach(step => {
                const btn = document.createElement('button');
                btn.className = 'step-pill';
                btn.innerHTML = `<strong>+</strong> ${step}`;
                btn.onclick = () => addStep(step);
                masterList.appendChild(btn);
            });

            selectedContainer.addEventListener('dragover', handleDragOver);
            selectedContainer.addEventListener('drop', handleDrop);
        }

        function addStep(name) {
            const newStep = {
                id: 'id_' + Math.random().toString(36).substr(2, 9),
                name: name,
                responsible: ""
            };
            selectedSteps.push(newStep);
            render();
        }

        function removeStep(id) {
            selectedSteps = selectedSteps.filter(s => s.id !== id);
            render();
        }

        function updateResponsible(id, value) {
            const step = selectedSteps.find(s => s.id === id);
            if (step) {
                step.responsible = value;
                syncWithJotform();
            }
        }

        function handleDragOver(e) {
            e.preventDefault();
            const draggingElement = document.querySelector('.dragging');
            if (!draggingElement) return;
            const afterElement = getDragAfterElement(selectedContainer, e.clientY);
            if (afterElement == null) {
                selectedContainer.appendChild(draggingElement);
            } else {
                selectedContainer.insertBefore(draggingElement, afterElement);
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const newOrderIds = [...selectedContainer.querySelectorAll('.selected-card')].map(el => el.dataset.id);
            selectedSteps = newOrderIds.map(id => selectedSteps.find(step => step.id === id));
            render();
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.selected-card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function render() {
            selectedCount.innerText = selectedSteps.length;
            if (selectedSteps.length === 0) {
                selectedContainer.innerHTML = '<div class="empty-state">Select steps to begin.</div>';
            } else {
                selectedContainer.innerHTML = '';
                selectedSteps.forEach((step, index) => {
                    const card = document.createElement('div');
                    card.className = 'selected-card';
                    card.draggable = true;
                    card.dataset.id = step.id;
                    
                    card.ondragstart = (e) => {
                        e.target.classList.add('dragging');
                        e.dataTransfer.setData('text/plain', step.id);
                    };
                    card.ondragend = (e) => e.target.classList.remove('dragging');

                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-title"><span class="drag-handle">⋮⋮</span> ${index + 1}. ${step.name}</span>
                            <button class="remove-btn" onclick="removeStep('${step.id}')">✕</button>
                        </div>
                        <div class="input-group">
                            <label>Owner</label>
                            <input type="text" placeholder="Name" value="${step.responsible}" 
                                   oninput="updateResponsible('${step.id}', this.value)"
                                   onmousedown="event.stopPropagation()">
                        </div>
                    `;
                    selectedContainer.appendChild(card);
                });
            }
            syncWithJotform();
        }

        function getFormattedData() {
            const data = {
                totalSteps: selectedSteps.length,
                steps: selectedSteps.map(s => ({ step: s.name, owner: s.responsible }))
            };
            return JSON.stringify(data);
        }

        function syncWithJotform() {
            if (isReady && typeof JFCustomWidget !== 'undefined') {
                const value = getFormattedData();
                // Send data using the required 'value' key
                JFCustomWidget.sendData({ 
                    value: value,
                    valid: selectedSteps.length > 0 // Help Jotform realize the field is "filled"
                });
                console.log("Jotform: Data Synced", value);
            }
        }

        initUI();

        // SDK Integration
        if (typeof JFCustomWidget !== 'undefined') {
            JFCustomWidget.subscribe("ready", function(data) {
                isReady = true;
                console.log("Jotform: Widget Ready", data);
                
                // Initialize widget with existing value if available (essential for multi-page/edit)
                if (data && data.value) {
                    try {
                        const saved = JSON.parse(data.value);
                        if (saved && Array.isArray(saved.steps)) {
                            selectedSteps = saved.steps.map(s => ({
                                id: 'id_' + Math.random().toString(36).substr(2, 9),
                                name: s.step,
                                responsible: s.owner || ""
                            }));
                            render();
                        }
                    } catch (e) {
                        console.warn("Jotform: Failed to parse initial value.", e);
                    }
                }

                JFCustomWidget.requestFrameResize({ 
                    height: document.body.offsetHeight + 40
                });

                setInterval(() => {
                    JFCustomWidget.requestFrameResize({ 
                        height: document.body.offsetHeight + 40
                    });
                }, 1000);
            });

            // Capture the submit event to send final state
            JFCustomWidget.subscribe("submit", function() {
                console.log("Jotform: Submit event received");
                const payload = {
                    valid: selectedSteps.length > 0,
                    value: getFormattedData()
                };
                JFCustomWidget.sendSubmit(payload);
            });
        }
    </script>
</body>
</html>
