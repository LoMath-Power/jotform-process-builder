<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jotform Widget - Minimalist</title>
    <!-- Official Jotform SDK -->
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
        .container { display: flex; gap: 10px; }
        .col { flex: 1; background: white; padding: 15px; border: 1px solid #ccc; border-radius: 5px; min-height: 300px; }
        h3 { margin-top: 0; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        .add-btn { 
            display: block; width: 100%; text-align: left; padding: 8px; margin-bottom: 5px; 
            background: #fff; border: 1px solid #ddd; cursor: pointer; border-radius: 3px; font-size: 13px;
        }
        .add-btn:hover { background: #f0f0f0; }

        .step-row { 
            background: #fff; border: 1px solid #3498db; border-left: 4px solid #3498db; 
            padding: 10px; margin-bottom: 10px; border-radius: 3px; position: relative;
        }
        .step-name { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        .step-input { width: 100%; box-sizing: border-box; padding: 5px; border: 1px solid #ccc; font-size: 12px; }
        .remove-btn { position: absolute; top: 5px; right: 5px; color: red; border: none; background: none; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="col">
        <h3>Possible Steps</h3>
        <div id="master-list"></div>
    </div>
    <div class="col">
        <h3>Your Process</h3>
        <div id="selected-list"></div>
    </div>
</div>

<script>
    const options = [
        "Project Planning", "Content Briefing", "Initial Drafting", "Internal Review", 
        "SME Review", "Translation Prep", "Language Services (LS)", "Translation", 
        "Localization Review", "Linguistic Sign-off", "QA", "Final Approval", "Publishing"
    ];

    let selectedSteps = [];

    function addStep(name) {
        selectedSteps.push({ name: name, owner: "" });
        render();
    }

    function removeStep(index) {
        selectedSteps.splice(index, 1);
        render();
    }

    function updateOwner(index, val) {
        selectedSteps[index].owner = val;
        sync(); 
    }

    function render() {
        const list = document.getElementById('selected-list');
        list.innerHTML = selectedSteps.length === 0 ? '<p style="color:gray; font-size:12px;">No steps added.</p>' : '';
        
        selectedSteps.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'step-row';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeStep(${i})">Remove</button>
                <span class="step-name">${i + 1}. ${s.name}</span>
                <input class="step-input" type="text" placeholder="Responsible person" value="${s.owner}" oninput="updateOwner(${i}, this.value)">
            `;
            list.appendChild(div);
        });
        sync();
    }

    function sync() {
        if (typeof JFCustomWidget !== 'undefined') {
            const dataString = JSON.stringify(selectedSteps);
            // sendData tells Jotform the current value of the field immediately
            JFCustomWidget.sendData({ value: dataString });
        }
    }

    // Build the master list buttons
    const mList = document.getElementById('master-list');
    options.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'add-btn';
        b.innerText = "+ " + opt;
        b.onclick = () => addStep(opt);
        mList.appendChild(b);
    });

    if (typeof JFCustomWidget !== 'undefined') {
        JFCustomWidget.subscribe("ready", function(data) {
            // Restore data if it exists (for edits or multi-page forms)
            if (data && data.value) {
                try {
                    const parsed = JSON.parse(data.value);
                    if (Array.isArray(parsed)) {
                        selectedSteps = parsed;
                        render();
                    }
                } catch (e) { console.error("Parse error", e); }
            }

            // Ensure the iframe height matches the content
            setInterval(() => {
                JFCustomWidget.requestFrameResize({ height: document.body.offsetHeight + 40 });
            }, 1000);
        });

        JFCustomWidget.subscribe("submit", function() {
            // Final confirmation of data on form submission
            const dataString = JSON.stringify(selectedSteps);
            const result = {
                valid: true,
                value: dataString
            };
            JFCustomWidget.sendSubmit(result);
        });
    }
</script>

</body>
</html>
